services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-github_human_auth}
      POSTGRES_USER: ${POSTGRES_USER:-github_human_auth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-github_human_auth}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8080
      RUST_LOG: ${RUST_LOG:-info}
      DATABASE_URL: ${DATABASE_URL:-postgres://github_human_auth:github_human_auth@postgres:5432/github_human_auth}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-gho_session}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_PRIVATE_KEY: ${GITHUB_PRIVATE_KEY:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_API_BASE: ${GITHUB_API_BASE:-https://api.github.com}
      GITHUB_WEB_URL: ${GITHUB_WEB_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:3000}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
      TURNSTILE_DEV_BYPASS: ${TURNSTILE_DEV_BYPASS:-false}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      API_BASE_URL: ${API_BASE_URL:-http://api:8080}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres-data:
